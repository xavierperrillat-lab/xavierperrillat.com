backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Contenu du site"
    editor:
      preview: false
    files:

      - name: "hero"
        label: "Hero"
        file: "src/_data/hero.json"
        fields:
          - name: "lines"
            label: "Lignes du hero"
            widget: "list"
            fields:
              - { name: "text", label: "Texte (vide si animé)", widget: "string", required: false }
              - { name: "animated", label: "Ligne animée ?", widget: "boolean", default: false }
              - name: "slides"
                label: "Textes qui défilent"
                widget: "list"
                required: false
                field: { name: "slide", label: "Texte", widget: "string" }

      - name: "projets"
        label: "Projets"
        file: "src/_data/projets.json"
        fields:
          - name: "items"
            label: "Liste des projets"
            widget: "list"
            fields:
              - { name: "name", label: "Nom du projet", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "miniature", label: "Miniature (carrée)", widget: "image", required: false }
              - name: "medias"
                label: "Galerie (images, vidéos, lotties)"
                widget: "list"
                fields:
                  - name: "type"
                    label: "Type de media"
                    widget: "select"
                    options:
                      - { label: "Image", value: "image" }
                      - { label: "Vidéo (MP4 autoplay)", value: "video" }
                      - { label: "Lottie (JSON)", value: "lottie" }
                    default: "image"
                  - { name: "file", label: "Fichier", widget: "file" }

      - name: "apropos"
        label: "À propos"
        file: "src/_data/apropos.json"
        fields:
          - { name: "image", label: "Photo", widget: "image" }
          - name: "paragraphs"
            label: "Paragraphes"
            widget: "list"
            field: { name: "paragraph", label: "Paragraphe", widget: "text" }

      - name: "contact"
        label: "Contact"
        file: "src/_data/contact.json"
        fields:
          - { name: "email", label: "Email", widget: "string" }
          - { name: "phone", label: "Téléphone (affiché)", widget: "string" }
          - { name: "phone_link", label: "Téléphone (lien, ex: +33698885452)", widget: "string" }
          - { name: "instagram", label: "Lien Instagram", widget: "string" }
          - { name: "linkedin", label: "Lien LinkedIn", widget: "string" }
